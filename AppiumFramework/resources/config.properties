# =============================================================
# config.properties - Central Configuration File
# All device and app settings are managed here.
# Override any value via Maven -D flags (e.g., -DdeviceName=Pixel7)
# =============================================================

# ----- Appium Server -----
appium.server.url=http://127.0.0.1:4723

# ----- Platform -----
platform.name=Android

# ----- Device 1 (Default / Emulator) -----
device.name=emulator-5554
platform.version=13.0
udid=emulator-5554

# ----- Device 2 (Real Device - used in parallel suite) -----
device2.name=RealDevice1
device2.platform.version=12.0
device2.udid=R3CN20ABCDE

# ----- App Under Test -----
# Place your .apk in the /drivers folder
app.path=drivers/saucedemo.apk
app.package=com.saucelabs.mydemoapp.android
app.activity=com.saucelabs.mydemoapp.android.view.activities.MainActivity

# ----- Appium Capabilities -----
automation.name=UiAutomator2
no.reset=false
full.reset=false
new.command.timeout=120
auto.grant.permissions=true

# ----- Waits (seconds) -----
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ----- Screenshot -----
screenshot.dir=reports/screenshots/

# ----- Test Data -----
testdata.path=resources/testdata.json

# ----- Reporting -----
extent.report.dir=reports/ExtentReport.html
